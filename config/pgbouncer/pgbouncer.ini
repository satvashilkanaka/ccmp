[databases]
* = host=postgres port=5432 dbname=ccmp user=ccmp_user

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Connection limits
max_client_conn = 500
default_pool_size = 20

; Pool mode: must be transaction (not session) for high concurrency scaling.
; DANGER: We cannot use LISTEN/NOTIFY through transaction mode pools!
pool_mode = transaction

; Timeout parameters
server_idle_timeout = 600
client_idle_timeout = 600
query_timeout = 300
